<script>
const SEGS = [
  { label:"Azúcar",    icon:"🍬", fill:"#7a1a1a", fillLight:"#bb3030" },
  { label:"Bebidas",   icon:"🥤", fill:"#1a4a7a", fillLight:"#2a6aaa" },
  { label:"Dientes",   icon:"🦷", fill:"#4a4a1a", fillLight:"#7a7a2a" },
  { label:"Dulces",    icon:"🍭", fill:"#6a1a5a", fillLight:"#9a2a88" },
  { label:"Carbohid.", icon:"🌾", fill:"#1a6b3a", fillLight:"#28994f" },
  { label:"Grasas",    icon:"🥑", fill:"#2a7a2a", fillLight:"#3daa3d" },

const ALL_Q = [
  { num:1, type:"multi", text:"¿Cuáles son los efectos negativos del azúcar?", opts:["Puede dañar los dientes, favorecer el sobrepeso y aportar muchas calorías con poco valor nutritivo.","Hace que el cuaderno cante en clases.","Sirve para que los lápices crezcan en los árboles."], correct:0 },
  { num:2, type:"multi", text:"¿Las bebidas azucaradas aumentan el riesgo de sobrepeso?", opts:["No, porque el azúcar desaparece al correr.","Sí.","Solo si la bebida es de color azul."], correct:1 },
  { num:3, type:"multi", text:"¿Qué problema dental se relaciona con el exceso de azúcar?", opts:["La caries dental.","Que los dientes brillen como linterna.","Que la lengua se vuelva cuadrada."], correct:0 },
  { num:4, type:"multi", text:"¿Los dulces se deben comer en exceso?", opts:["Sí, todos los días y a toda hora.","No. Se deben consumir solo de vez en cuando y en poca cantidad.","Sí, porque reemplazan el desayuno y el almuerzo."], correct:1 },
  { num:5, type:"multi", text:"¿Qué fuentes de carbohidratos se consideran más saludables?", opts:["Los granos integrales, las frutas, las verduras y las legumbres.","Los caramelos, las gomitas y las bebidas.","Las nubes, los botones y las tizas."], correct:0 },
  { num:6, type:"multi", text:"¿Es mejor reemplazar grasas saturadas por grasas saludables y alimentos con fibra que por ultraprocesados?", opts:["No, porque da lo mismo lo que uno coma.","Sí.","Solo si lo dice un extraterrestre."], correct:1 },
  { num:7, type:"multi", text:"Nombra un alimento alto en grasas saturadas.", opts:["La mantequilla.","El agua.","Un borrador."], correct:0 },
  { num:8, type:"multi", text:"¿Son malos todos los carbohidratos?", opts:["Sí, todos son malos siempre.","No. Los carbohidratos le dan energía al cuerpo; lo importante es elegir los más saludables.","No, porque son juguetes de cocina."], correct:1 },
  { num:9, type:"multi", text:"¿Cuáles son los efectos negativos del sodio?", opts:["Consumido en exceso puede subir la presión arterial y aumentar el riesgo de enfermedades del corazón.","Hace que los zapatos naden.","Sirve para convertir el pan en piedra."], correct:0 },
  { num:10, type:"multi", text:"¿Cuáles son los efectos negativos de las grasas saturadas?", opts:["Ayudan a que el corazón funcione mejor que nunca.","En exceso pueden subir el colesterol malo y aumentar el riesgo de problemas al corazón.","Hacen que el pelo cambie de color cada hora."], correct:1 },
  { num:11, type:"multi", text:"Según Harvard, ¿qué alimentos no debemos consumir o debemos limitar?", opts:["Debemos limitar la carne roja, el queso y los granos refinados, y evitar las bebidas azucaradas y las carnes procesadas como tocino y embutidos.","Debemos evitar las frutas, verduras y el agua.","Debemos comer solo helado con galletas todos los días."], correct:0 },
  { num:12, type:"multi", text:"¿Para qué nos ayuda la vitamina D?", opts:["Para convertir las mochilas en robots.","Ayuda al cuerpo a absorber calcio y a mantener los huesos fuertes. También ayuda a los músculos.","Sirve para que los cuadernos vuelen."], correct:1 },
  { num:13, type:"multi", text:"¿Para qué nos ayuda la vitamina A?", opts:["Ayuda a la vista, al sistema de defensas y al crecimiento del cuerpo.","Sirve para respirar debajo del pupitre.","Hace que los calcetines hablen."], correct:0 },
  { num:14, type:"multi", text:"¿Qué es un carbohidrato complejo?", opts:["Es un carbohidrato formado por cadenas largas de azúcar, que suele entregar energía de manera más lenta y estable.","Es un pan que sabe matemáticas.","Es una fruta que maneja auto."], correct:0 },
  { num:15, type:"multi", text:"¿Qué combinación ayuda a mantener huesos fuertes?", opts:["Ketchup y mayonesa.","Calcio y vitamina D.","Chocolate y papas fritas."], correct:1 },
  { num:16, type:"multi", text:"¿Qué es un carbohidrato simple?", opts:["Es un carbohidrato que el cuerpo descompone rápido para usarlo como energía.","Es un tallarín que toca guitarra.","Es una cuchara con sabor a naranja."], correct:0 },
  { num:17, type:"open", text:"Menciona 3 alimentos de carbohidratos simples." },
  { num:18, type:"open", text:"Menciona 3 alimentos de carbohidratos complejos." },
  { num:19, type:"open", text:"Menciona 3 alimentos altos en sodio." },
  { num:20, type:"open", text:"Menciona 3 alimentos altos en azúcar." },
  { num:21, type:"open", text:"Menciona 3 alimentos altos en grasas saturadas." },
];

let used = [];
let rot = 0;
let spinning = false;
let overlayOpen = false;
let muted = false;
let audioCtx = null;

function pickQ() {
  if (used.length >= ALL_Q.length) used = [];
  const avail = ALL_Q.filter((_, i) => !used.includes(i));
  const q = avail[Math.floor(Math.random() * avail.length)];
  used.push(ALL_Q.indexOf(q));
  return q;
}

const N = SEGS.length;
const ARC = (2 * Math.PI) / N;
const cv = document.getElementById('top');
const ctx = cv.getContext('2d');
const CX = 320, CY = 320, R = 300;

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTick(speed) {
  if (muted) return;
  try {
    const ac = getAudio(), o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.frequency.value = Math.min(600 + speed * 800, 1400);
    o.type = 'triangle';
    g.gain.setValueAtTime(0.18, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.06);
    o.start(ac.currentTime);
    o.stop(ac.currentTime + 0.06);
  } catch (e) {}
}

function playFanfare() {
  if (muted) return;
  try {
    const ac = getAudio();
    [523, 659, 784, 1047].forEach((f, i) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine'; o.frequency.value = f;
      const t = ac.currentTime + i * 0.13;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.22, t + 0.04);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.38);
      o.start(t); o.stop(t + 0.38);
    });
  } catch (e) {}
}

function playCorrectSound() {
  if (muted) return;
  try {
    const ac = getAudio();
    [523, 659, 784, 1047, 1318].forEach((f, i) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine'; o.frequency.value = f;
      const t = ac.currentTime + i * 0.1;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.25, t + 0.04);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      o.start(t); o.stop(t + 0.4);
    });
  } catch (e) {}
}

function playWrongSound() {
  if (muted) return;
  try {
    const ac = getAudio();
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(300, ac.currentTime);
    o.frequency.linearRampToValueAtTime(80, ac.currentTime + 0.5);
    g.gain.setValueAtTime(0.3, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.55);
    o.start(ac.currentTime);
    o.stop(ac.currentTime + 0.55);
  } catch (e) {}
}

['🌿', '🍃', '🌱', '🍀'].forEach((l, i) => {
  const d = document.createElement('div');
  d.className = 'leaf';
  d.textContent = l;
  d.style.cssText = `left:${[4,89,3,91][i]}%;top:${[10,16,76,70][i]}%;animation-delay:${i * 1.2}s;font-size:${20 + i * 3}px`;
  document.getElementById('leaves').appendChild(d);
});

function drawWheel(r) {
  ctx.clearRect(0, 0, 540, 540);
  for (let i = 0; i < N; i++) {
    const s = r + i * ARC, e = s + ARC, S = SEGS[i];
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, R, s, e);
    ctx.closePath();
    ctx.fillStyle = S.fill;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.13)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  for (let i = 0; i < N; i++) {
    const s = r + i * ARC, mid = s + ARC / 2, S = SEGS[i];
    const grd = ctx.createLinearGradient(
      CX + Math.cos(mid) * R * 0.1,
      CY + Math.sin(mid) * R * 0.1,
      CX + Math.cos(mid) * R,
      CY + Math.sin(mid) * R
    );
    grd.addColorStop(0, S.fillLight + 'aa');
    grd.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, R, s, s + ARC);
    ctx.closePath();
    ctx.fillStyle = grd;
    ctx.fill();

    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(mid);
    const lx = R * 0.62;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = '40px system-ui';
    ctx.fillText(S.icon, lx, -16);
    ctx.font = '700 20px system-ui, sans-serif';
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillText(S.label, lx + 1, 9);
    ctx.fillStyle = '#ffffff';
    ctx.fillText(S.label, lx, 8);
    ctx.restore();
  }

  ctx.beginPath();
  ctx.arc(CX, CY, R, 0, 2 * Math.PI);
  ctx.strokeStyle = 'rgba(125,204,108,0.8)';
  ctx.lineWidth = 6;
  ctx.stroke();

  const hub = ctx.createRadialGradient(CX - 7, CY - 7, 1, CX, CY, 32);
  hub.addColorStop(0, '#d4ffb0');
  hub.addColorStop(0.5, '#4caa20');
  hub.addColorStop(1, '#1a5500');
  ctx.beginPath();
  ctx.arc(CX, CY, 32, 0, 2 * Math.PI);
  ctx.fillStyle = hub;
  ctx.fill();
  ctx.strokeStyle = 'rgba(125,204,108,0.9)';
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.font = '19px system-ui';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🌿', CX, CY + 1);
}

drawWheel(rot);

const CONFETTI_COLORS = ['#ff4e91','#ff9d00','#ffe300','#00c846','#00aaff','#aa44ff','#ff6b6b','#00e5ff','#69ff47'];

function launchConfetti() {
  const layer = document.getElementById('confetti-layer');
  layer.innerHTML = '';
  for (let i = 0; i < 120; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    const color = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
    const left = Math.random() * 100;
    const delay = Math.random() * 1.2;
    const dur = 1.8 + Math.random() * 1.5;
    const w = 8 + Math.random() * 10;
    const h = 8 + Math.random() * 10;
    const shape = Math.random() > 0.5 ? '50%' : '2px';
    p.style.cssText = `background:${color};left:${left}%;top:-20px;width:${w}px;height:${h}px;border-radius:${shape};animation-duration:${dur}s;animation-delay:${delay}s;`;
    layer.appendChild(p);
  }
  setTimeout(() => { layer.innerHTML = ''; }, 4000);
}

function showWrongX() {
  const wo = document.getElementById('wrong-overlay');
  const bx = document.getElementById('big-x');
  bx.style.opacity = '0';
  bx.style.transform = 'scale(3)';
  wo.classList.add('show');
  requestAnimationFrame(() => requestAnimationFrame(() => {
    bx.style.opacity = '1';
    bx.style.transform = 'scale(1)';
  }));
  setTimeout(() => {
    bx.style.opacity = '0';
    bx.style.transform = 'scale(0.5)';
    setTimeout(() => wo.classList.remove('show'), 400);
  }, 2200);
}

function launchSparks() {
  const sc = document.getElementById('sparkle-container');
  const wr = document.getElementById('wrap').getBoundingClientRect();
  const cr = document.getElementById('container').getBoundingClientRect();
  const cx = cr.left - wr.left + cr.width / 2;
  const cy = cr.top - wr.top + cr.height / 2;
  const colors = ['#7dcc6c','#a8e88c','#d4ffb0','#4caa20','#50cc80'];
  for (let i = 0; i < 28; i++) {
    const sp = document.createElement('div');
    sp.className = 'spark';
    const ang = Math.random() * 2 * Math.PI;
    const d = 100 + Math.random() * 120;
    const sz = 4 + Math.random() * 6;
    sp.style.cssText = `background:${colors[i % colors.length]};width:${sz}px;height:${sz}px;left:${cx}px;top:${cy}px;--dx:${Math.cos(ang) * d}px;--dy:${Math.sin(ang) * d}px;animation-delay:${Math.random() * 0.15}s`;
    sc.appendChild(sp);
    setTimeout(() => sp.remove(), 1100);
  }
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(() => toast.classList.remove('show'), 1800);
}

function spin() {
  if (spinning || overlayOpen) return;
  spinning = true;
  document.getElementById('spin-btn').disabled = true;
  getAudio();

  const extra = (Math.random() * 2 * Math.PI) + (Math.PI * 10);
  const dur = 4200;
  const t0 = performance.now();
  const r0 = rot;

  function ease(t) { return 1 - Math.pow(1 - t, 4.5); }
  let lastSeg = -1;

  requestAnimationFrame(function loop(now) {
    const t = Math.min((now - t0) / dur, 1);
    const prev = rot;
    rot = r0 + extra * ease(t);
    drawWheel(rot);

    const speed = (rot - prev) / ARC;
    const angle = (2 * Math.PI - (rot % (2 * Math.PI))) % (2 * Math.PI);
    const cur = Math.floor(angle / ARC) % N;
    if (cur !== lastSeg) {
      playTick(Math.min(speed, 1));
      lastSeg = cur;
    }

    if (t < 1) {
      requestAnimationFrame(loop);
    } else {
      rot = rot % (2 * Math.PI);
      spinning = false;
      document.getElementById('spin-btn').disabled = false;
      playFanfare();
      setTimeout(showQ, 300);
    }
  });
}

function showQ() {
  const q = pickQ();
  document.getElementById('q-num').textContent = 'Pregunta ' + q.num + ' de 21';
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('feedback').textContent = '';
  document.getElementById('open-note').style.display = 'none';
  const optsArea = document.getElementById('opts-area');
  optsArea.innerHTML = '';

  if (q.type === 'multi') {
    const labels = ['A)', 'B)', 'C)'];
    q.opts.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.textContent = labels[i] + ' ' + opt;
      btn.addEventListener('click', function () {
        document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
        if (i === q.correct) {
          btn.classList.add('correct');
          document.getElementById('feedback').style.color = '#a8e88c';
          document.getElementById('feedback').textContent = '🎉 ¡Correcto!';
          playCorrectSound();
          launchConfetti();
        } else {
          btn.classList.add('wrong');
          document.querySelectorAll('.opt-btn')[q.correct].classList.add('correct');
          document.getElementById('feedback').style.color = '#ff7070';
          document.getElementById('feedback').textContent = 'La respuesta correcta es ' + labels[q.correct];
          playWrongSound();
          showWrongX();
        }
      });
      optsArea.appendChild(btn);
    });
  } else {
    const note = document.getElementById('open-note');
    note.style.display = 'block';
    note.textContent = 'Pregunta abierta: responde en voz alta o en equipo.';
  }

  launchSparks();
  const ov = document.getElementById('overlay');
  const card = document.getElementById('q-card');
  overlayOpen = true;
  ov.classList.add('show');
  card.classList.remove('pop');
  requestAnimationFrame(() => requestAnimationFrame(() => card.classList.add('pop')));
}

function closeOverlay() {
  document.getElementById('q-card').classList.remove('pop');
  setTimeout(() => {
    document.getElementById('overlay').classList.remove('show');
    overlayOpen = false;
  }, 320);
}

function resetWheel() {
  if (spinning) return;
  used = [];
  rot = 0;
  drawWheel(rot);
  if (overlayOpen) closeOverlay();
  document.getElementById('confetti-layer').innerHTML = '';
  showToast('Ruleta reiniciada');
}

async function toggleFullscreen() {
  try {
    if (!document.fullscreenElement) {
      await document.documentElement.requestFullscreen();
      showToast('Pantalla completa activada');
    } else {
      await document.exitFullscreen();
      showToast('Pantalla completa desactivada');
    }
  } catch (e) {
    showToast('Tu navegador bloqueó la pantalla completa');
  }
}

document.getElementById('spin-btn').addEventListener('click', spin);
document.getElementById('q-close').addEventListener('click', closeOverlay);
document.getElementById('overlay').addEventListener('click', function (e) { if (e.target === this) closeOverlay(); });
document.getElementById('mute-btn').addEventListener('click', function () { muted = !muted; this.textContent = muted ? '🔇' : '🔊'; });
document.getElementById('fullscreen-btn').addEventListener('click', toggleFullscreen);
document.getElementById('reset-btn').addEventListener('click', resetWheel);

document.addEventListener('keydown', function (e) {
  if (e.code === 'Space') {
    e.preventDefault();
    overlayOpen ? closeOverlay() : spin();
  }
  if (e.key.toLowerCase() === 'r') resetWheel();
  if (e.key.toLowerCase() === 'f') toggleFullscreen();
});
</script>
